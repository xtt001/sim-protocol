# eval_suite_v0.yaml — Shared AGX Excavation Eval Suite Skeleton
#
# Repo: sim-protocol (Repo C - shared)
# Last updated: 2026-03-19
# Status: aligned to current known Repo B / Repo A behavior.
# Unsettled values remain explicit TODOs.

suite_name: "agx_excavation_v0"
suite_version: "v0"
protocol_version: "agx-sim/v0"
schema_version: "1.1"

success:
  rule: "mass_in_bucket_kg_hold"
  mass_thresh_kg: 2.0
  hold_steps: 25
  env_state_signal: "mass_in_bucket_kg"
  env_state_index: 0
  note: "Chosen from current Unity exported runs: above observed sub-kg noise and below the smallest clear scoop (~2.10775 kg)."

rollout:
  control_hz: 50
  dt: 0.02
  episode_len: 500
  num_rollouts_default: 10
  num_rollouts_final: 50

scenarios:
  - id: "s0_baseline"
    description: "Current baseline fixed reset in the Unity scene."
    seeds: [0, 1, 2]
    reset_terrain: false
    reset_pose: true
    scenario_id: ""
    notes:
      - "Use current Unity default scene content."
      - "Broader terrain/scenario coverage belongs in a later eval suite revision."

artifacts:
  metrics_file: "metrics.json"
  summary_csv: "summary.csv"
  video_dir: "videos/"
  save_video: true

determinism:
  reset_mode: "baseline_fixed"
  note: >
    V0 assumes repeatable reset pose and empty-bucket state.
    Full seeded terrain determinism is not locked yet.

baselines: {}
