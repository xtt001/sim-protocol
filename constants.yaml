# constants.yaml — AGXUnity ↔ Python Shared Constants (V0)
#
# Repo: sim-protocol (Repo C — shared)
# Last updated: 2026-03-18
# Rule: Any change to ordering, dimensions, or numeric values requires a joint
#       PR review + version bump in the affected protocol/schema sections.
#
# How to use:
#   Python:  yaml.safe_load(open("constants.yaml"))
#   C#:      parse with YamlDotNet or equivalent; or hardcode the same values
#            keeping this file as the single source of truth.
# ─────────────────────────────────────────────────────────────────────────────

# ── Protocol wire constants ───────────────────────────────────────────────────
protocol:
  version: 1
  magic:   0xA6A6A6A6      # uint32, little-endian
  header_size: 16          # bytes

  # Message type codes (uint16)
  msg_types:
    GET_INFO_REQ:  1
    GET_INFO_RESP: 2
    RESET_REQ:     3
    RESET_RESP:    4
    STEP_REQ:      5
    STEP_RESP:     6

  # Image format codes (uint8 in STEP_RESP)
  image_format:
    NONE:    0
    RAW_RGB: 1
    H264:    2

  # V0 payload sizes (bytes; informational, do not use as sole validation)
  payload_sizes:
    step_req_fixed:        32   # "<qffffq"
    step_resp_fixed_part1: 40   # "<qfffffffI"
    step_resp_fixed_part2: 20   # "<fBxxxiiI"
    reset_req_fixed:       12   # "<iBBxxI"
    reset_resp:            16   # "<BxxxffI"

# ── Control loop parameters ───────────────────────────────────────────────────
control:
  hz:  50        # control rate (Hz)
  dt:  0.02      # timestep (seconds) = 1 / hz

# ── Action vector (LOCKED, V0) ────────────────────────────────────────────────
action:
  dim: 4
  semantics: "actuator_speed_cmd"
  range: [-1.0, 1.0]          # normalized, post-deadzone, post-scale
  order:                       # index → signal name
    0: swing_speed_cmd
    1: boom_speed_cmd
    2: stick_speed_cmd
    3: bucket_speed_cmd

  # Default teleop scaling (from teleop_v0.yaml — informational copy)
  # Override per session in run config; store actual values in HDF5 metadata.
  defaults:
    deadzone: [0.05, 0.05, 0.05, 0.05]   # per-axis, applied before scale
    scale:    [1.0,  1.0,  1.0,  1.0]    # speed multiplier
    limit:    [1.0,  1.0,  1.0,  1.0]    # hard clip after scale
    invert:   [false, true, false, true]  # negate axis (Y axes typically inverted)

# ── qpos vector (LOCKED, V0) ──────────────────────────────────────────────────
qpos:
  dim: 3
  range: [0.0, 1.0]           # normalized position
  order:                       # index → signal name
    0: boom_position_norm      # from BoomPrismatics[0]
    1: stick_position_norm
    2: bucket_position_norm

  notes:
    - "swing_position_norm is NOT available in V0 and is omitted."
    - "boom uses BoomPrismatics[0] only; expanding to multiple prismatics requires a version bump."

# ── qvel vector (LOCKED, V0) ──────────────────────────────────────────────────
qvel:
  dim: 4
  units: "physical"            # not normalized
  order:                       # index → signal name
    0: swing_speed
    1: boom_speed              # from BoomPrismatics[0]
    2: stick_speed
    3: bucket_speed

# ── env_state vector (V0) ────────────────────────────────────────────────────
env_state:
  dim: 1                       # minimum; may grow in future versions
  order:                       # index → signal name
    0: mass_in_bucket

  mass_in_bucket:
    index: 0
    units: "kg"                # TODO: confirm exact units with Unity team
    notes: "AGX-simulated mass of excavated material held in the bucket."

# ── Success rule (eval, spec §8) ─────────────────────────────────────────────
success:
  # Primary rule: mass-based
  mass_thresh: 1.0             # kg; TODO: replace with team-defined value
  hold_steps:  25              # consecutive steps = 0.5s @ 50Hz
  env_state_idx: 0             # index of mass_in_bucket in env_state

  # Fallback (if mass_in_bucket unavailable):
  #   posture-based thresholds on qpos + qvel stability for hold_steps
  #   (not yet implemented — define if needed)

# ── Camera definitions (V0) ──────────────────────────────────────────────────
cameras:
  fpv:
    name:         "fpv"
    description:  "First-person (driver-view) camera; required in V0"
    width:        320          # TODO: confirm resolution with Unity team
    height:       240          # TODO: confirm resolution with Unity team
    fps:          50           # matches control_hz
    format_v0:    "raw_rgb"    # uint8 RGB, H×W×3
    format_v1:    "h264"       # future; optional

# ── HDF5 schema version ───────────────────────────────────────────────────────
schema:
  version: "1.1"

# ── Reset mode (V0) ───────────────────────────────────────────────────────────
reset:
  mode: "baseline_fixed"       # V0: fixed initial pose + empty bucket
  future_modes:
    - "seeded_deterministic"   # full seed control (future)
