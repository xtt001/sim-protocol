# constants.yaml — Shared AGXUnity / Python Constants
#
# Repo: sim-protocol (Repo C - shared)
# Last updated: 2026-03-24
# Status: aligned to the current Repo B implementation where values are known.
# Unsettled values are left null or explicitly noted as provisional.

protocol:
  header_version: 1
  logical_version: "agx-sim/v0"
  magic: 0xA6A6A6A6
  header_size_bytes: 16
  max_payload_bytes: 134217728

  msg_types:
    GET_INFO_REQ: 1
    GET_INFO_RESP: 2
    RESET_REQ: 3
    RESET_RESP: 4
    STEP_REQ: 5
    STEP_RESP: 6

  image_pixel_format: "raw_rgb"
  image_row_order: "top_to_bottom"

control:
  hz: 50
  dt: 0.02

action:
  dim: 4
  semantics: "actuator_speed_cmd"
  range: [-1.0, 1.0]
  order:
    0: swing_speed_cmd
    1: boom_speed_cmd
    2: stick_speed_cmd
    3: bucket_speed_cmd

  teleop_defaults:
    deadzone: [0.05, 0.05, 0.05, 0.05]
    scale: [1.0, 1.0, 1.0, 1.0]
    limit: [1.0, 1.0, 1.0, 1.0]
    invert: [false, true, false, true]

qpos:
  dim: 4
  range: [0.0, 1.0]
  order:
    0: swing_position_norm
    1: boom_position_norm
    2: stick_position_norm
    3: bucket_position_norm

  notes:
    - "swing_position_norm is present in the current Unity implementation."
    - "Its normalization window is scene/config dependent and not a true hard-limit definition."
    - "boom values currently come from BoomPrismatics[0]."

qvel:
  dim: 4
  units: "runtime_reported_actuator_speed"
  order:
    0: swing_speed
    1: boom_speed
    2: stick_speed
    3: bucket_speed

env_state:
  order:
    0: mass_in_bucket_kg
    1: excavated_mass_kg
    2: mass_in_target_box_kg
    3: deposited_mass_in_target_box_kg
    4: min_distance_to_target_m

  mass_in_bucket_kg:
    index: 0
    units: "kg"
    notes: "Current bucket-contained dynamic material estimate."

  excavated_mass_kg:
    index: 1
    units: "kg"
    notes: "Cumulative positive bucket-load gain within the current episode."

  mass_in_target_box_kg:
    index: 2
    units: "kg"
    notes: "Current measured mass inside the currently active Unity dump target."

  deposited_mass_in_target_box_kg:
    index: 3
    units: "kg"
    notes: "Reset-relative net retained mass inside the currently active Unity dump target."

  min_distance_to_target_m:
    index: 4
    units: "m"
    notes: "Approximate minimum distance between the current bucket body measurement volume and the active target measurement volume; -1.0 means unavailable."

wire_reward:
  field: "STEP_RESP.reward"
  source_signal: "deposited_mass_in_target_box_kg"
  units: "kg"
  semantics: "backup_success_proxy"
  note: "Unity mirrors retained target mass into the reward slot as a backup scalar. Repo A still computes the primary AGX mission reward locally."

success:
  rule: "retained_target_mass_hold"
  mass_thresh_kg: 100.0
  hold_steps: 25
  env_state_signal: "deposited_mass_in_target_box_kg"
  env_state_index: 3
  note: "Current V0 default: success if retained target mass stays above threshold for the configured hold window within the 1000-step stationary digging episode."

cameras:
  fpv:
    required: true
    pixel_format: "raw_rgb"
    row_order: "top_to_bottom"
    descriptor_from_get_info: true
    width: null
    height: null
    fps: null
    notes:
      - "Dimensions and fps are runtime-advertised by GET_INFO_RESP."

schema:
  version: "1.1"

reset:
  supports_reset_pose: true
  mode: "baseline_fixed"
  future_modes:
    - "seeded_deterministic"
